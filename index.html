function teamClass(team){

switch(team.toLowerCase()){

case "dream":
return "dream";

case "passion":
return "passion";

case "love":
return "love";

default:
return "trainee";

}

}

function memberCard(member){

const team = teamClass(member.team);

return `

<a
href="${member.profile}"
target="_blank"
class="
member

${member.rank===1 ? 'rank1' : ''}

${member.rank>=2 && member.rank<=3 ? 'rank23' : ''}

${member.rank>=4 && member.rank<=7 ? 'rank47' : ''}

${member.rank>=8 && member.rank<=12 ? 'rank812' : ''}

${member.rank===13 ? 'rank13' : ''}

${member.rank>=14 && member.rank<=15 ? 'rank1415' : ''}

${member.rank>=16 && member.rank<=19 ? 'rank1619' : ''}

${member.rank>=20 && member.rank<=24 ? 'rank2024' : ''}
">

<div class="rank-badge">
#${member.rank}
</div>

<div class="photo-wrap">

${member.rank===1 ? '<div class="crown">👑</div>' : ''}

${
member.rank===1 || member.rank===13 ?

`

<div class="center-gold">

<img
src="${member.photo}"
class="photo ${team}-border"

>

</div>
`

:

`
<img
src="${member.photo}"
class="photo ${team}-border"

>

`
}


<div class="badge ${team}">
${member.team}
</div>

</div>

<div class="name">
${member.name}
</div>
${member.rank===1 ?
`<div class="center-label main-center">CENTER</div>`
: ''}

${member.rank===13 ?
`<div class="center-label ug-center">UNDERGIRLS CENTER</div>`
: ''}

<div class="vote">
${member.votes.toLocaleString()} votes
</div>

</a>

`;

}

function renderPyramid(containerId,data){

let html="";
let index=0;

rows.forEach(row=>{

html+=`<div class="row">`;

for(let i=0;i<row;i++){

html+=memberCard(data[index]);

index++;

}

html+=`</div>`;

});

document.getElementById(containerId).innerHTML=html;

}

#${member.rank}
</span>
</td>

<td>

<div class="ranking-member">

${
member.rank===1 || member.rank===13 ?

`

<div class="table-center-frame">

<img
src="${member.photo}"
alt="${member.name}"
onerror="this.src='https://via.placeholder.com/80'"

>

</div>
`

:

`
<img
src="${member.photo}"
alt="${member.name}"
onerror="this.src='https://via.placeholder.com/80'"

>

`
}

<span class="member-name">
${member.name}
</span>

${
member.rank===1 ?

`<span class="center-label main-center">CENTER</span>`

: ''
}

${
member.rank===13 ?

`<span class="center-label ug-center">UG CENTER</span>`

: ''
}

</div>


</td>

<td>

<span class="team-pill ${teamClass(member.team)}">
${member.team.toUpperCase()}
</span>

</td>

<td>

<span class="vote-count">
${member.votes.toLocaleString()}
</span>

</td>

</tr>

`).join("");

</script>

</body>
</html>
